name: Release Plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Package and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate version tag
        run: |
          PLUGIN_VERSION="$(grep -E '^[[:space:]]*\* Version:' weekly-wildcat-headless.php | head -n 1 | sed -E 's/.*Version:[[:space:]]*//')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ -z "$PLUGIN_VERSION" ]; then
            echo "Could not find plugin Version header."
            exit 1
          fi

          if [ "$PLUGIN_VERSION" != "$TAG_VERSION" ]; then
            echo "Plugin version ($PLUGIN_VERSION) does not match tag ($GITHUB_REF_NAME)."
            exit 1
          fi

          echo "PLUGIN_VERSION=$PLUGIN_VERSION" >> "$GITHUB_ENV"

      - name: Build plugin zip
        run: |
          rm -rf build weekly-wildcat-headless.zip
          mkdir -p build/weekly-wildcat-headless

          rsync -a ./ build/weekly-wildcat-headless/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'build' \
            --exclude '*.zip' \
            --exclude '.DS_Store'

          cd build
          zip -qr weekly-wildcat-headless.zip weekly-wildcat-headless
          unzip -l weekly-wildcat-headless.zip | grep 'weekly-wildcat-headless/weekly-wildcat-headless.php'

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "build/weekly-wildcat-headless.zip#weekly-wildcat-headless.zip" \
            --title "$GITHUB_REF_NAME" \
            --notes "Weekly Wildcat Bridge $PLUGIN_VERSION"
